    dep:6, level:"LEVEL 6", title:"无光之地",
    onEnter:s=>{ s.flags.exp6=true; s.san-=9; },
    text:"你没有开灯。你只是,停下脚步,伸出颤抖的手,去摸索,刚才指尖掠过的、那面墙上,一些凸起的、异样的,刻痕。\n\n那不是自然的裂纹。那是,有人,用某种尖锐的东西,一笔一划,刻上去的,字。\n\n在绝对的黑暗里,你像一个盲人读盲文那样,用指尖,极其缓慢地,一个字,一个字地,「读」着那些刻痕:\n\n『别……开……灯。』\n\n你的心跳漏了一拍。你继续往下摸。\n\n『我们……有……十一……个人。开灯的……第一个……三秒……就……没了。』\n『现在……剩……三个。我们……手拉着手……在黑暗里……走。』\n『如果你……摸到……这行字……说明……你还……活着。别……松开……你自己的……手。别……相信……任何……让你……开灯的……声音。』\n\n就在你的指尖,移到最后一行时——\n\n你听见了。\n\n在你四周的黑暗里,响起了,极其微弱的、断断续续的、许多人的,低语声。它们从四面八方传来,近的仿佛就在耳边,远的又像隔着无数房间。你听不清它们在说什么,只能捕捉到零星的词:「灯」「回家」「疼」「妈妈」……\n\n那是,这一层所有,曾经开过灯、又没能立刻死去的人,残留下来的,声音吗?还是,某种,正在模仿人声、想要,诱你开灯的,东西?\n\n你猛地,把手,从墙上,收了回来,紧紧地,攥住了,自己的另一只手——就像,那行刻字,叮嘱的,那样。你在黑暗里,咬紧牙关,一步,也不敢停。",
    choices:[ { t:"继续在黑暗中摸索前进", go:"L6_grope" } ]
  },

  L7_explore:{
    dep:7, level:"LEVEL 7", title:"无限海洋",
    onEnter:s=>{ s.flags.exp7=true; s.water+=2; s.san-=4; },
    text:"你攀着礁石,爬向不远处,那艘搁浅的、锈迹斑斑的破船。它半截船身,搁在礁石上,另半截,泡在墨黑的海水里,随着波浪,发出沉闷的、金属摩擦的呻吟。\n\n你翻进船舱。里面积着水,漂着杂物,还有几个,早已看不出模样的、瘫在角落的,身影。你没有靠近它们。\n\n在船长室,你找到了一本还算完整的〔航海日志〕,和几瓶,密封完好的,淡水。你收好淡水,借着从破洞里漏进来的灰白天光,读起了日志:\n\n『第 1 天:我们决定,不再等待救援。我们要造船,航行,穿过这片海。它再大,总该有个,对岸。』\n『第 40 天:海,没有对岸。指南针失灵,星星是假的,太阳,根本不存在。我们,只是在,原地,打转。』\n『第 88 天:船员开始,一个个,跳海。他们说,听见,海底,有人,在唱歌,在喊他们的,名字。』\n『第 120 天:只剩我一个了。我看见,远处,有一座,亮着灯的,岩上之屋。他们说,那里,是安全的。可我知道,那不是家。那只是,让你,停下来,放弃,不再挣扎的,地方。\n\n我不去。我宁愿,在海上,一直,漂下去,朝着,那个,或许根本不存在的,对岸。至少,这样,我还是,一个,在「回家」的人。』\n\n日志,到此为止。你握着那几瓶淡水,望向舷窗外,那片无边无际的、吞噬了一整支船队的,黑海,久久,无言。",
    choices:[ { t:"爬出破船，回到礁石上", go:"L7_enter" } ]
  },

  L8_explore:{
    dep:8, level:"LEVEL 8", title:"洞穴系统",
    onEnter:s=>{ s.flags.exp8=true; s.san-=6; },
    text:"你举起手电,照向岩壁上,那片吸引了你的、古老的〔刻画〕。\n\n那是一整面,用矿物颜料和凿痕,绘成的,壁画,不知出自,多少年前,哪一位,或哪一代,抵达过这里的,前人之手。画风古朴,却,清晰得,惊人。\n\n壁画,讲述了一个,故事。\n\n最上方,画着许多小小的人,从一个个,方块(房间)里,坠落下来——那是,像你一样,穿模而入的,迷路者。\n\n中间,画着他们,向下,穿过,一层层,用不同符号标记的,险境:獠牙的犬(猎犬)、扭曲的闪电(电气)、纯黑的方块(无光)、翻涌的波纹(海洋)……绝大多数小人,都倒在了,半路。\n\n而在最下方,画着一扇,散发着光芒的,门。只有,极少数的几个小人,抵达了,那扇门前。\n\n你凑近去看那几个,幸存的小人——你发现,他们和,那些倒下的小人,有一个,决定性的,不同:\n\n每一个,抵达了光门的小人,胸口,都画着,一个小小的、发光的,符号。有的像一颗心,有的像一间小小的房子,有的像,一张,小小的,脸。\n\n而壁画的最下方,刻着一行,反复出现的,古老箴言,你虽然不认得那文字,却莫名地,读懂了它的,意思:\n\n【空手者,永堕深渊。怀锚者,方得归乡。】\n\n你的手,不自觉地,按上了,胸口。你忽然,明白了,那扇最深处的门,究竟,在等待,什么。",
    choices:[ { t:"记下这个启示，回到岔口", go:"L8_enter" } ]
  },

  L9_explore:{
    dep:9, level:"LEVEL 9", title:"无尽郊区",
    onEnter:s=>{ s.flags.exp9=true; s.san-=8; },
    text:"你走向那栋,亮着电视蓝光的房子,透过没有拉严的窗帘,向里望去。\n\n客厅里,一台老式电视,正对着一张空沙发,循环,播放着,什么。你鬼使神差地,推开了,虚掩的门,走了进去。\n\n电视屏幕上,是一段,家庭录像。\n\n画面里,是一个温馨的、四口之家。阳光很好的客厅,一对父母,两个孩子,在拆生日礼物,在追逐打闹,在餐桌前,笑着,举杯。画质,带着老录像特有的,温暖的颗粒感。\n\n你起初,只是,漠然地看着。可渐渐地,一种,毛骨悚然的,熟悉感,爬上了你的,脊背。\n\n那个客厅的,布置……那个父亲,系领带的,方式……那两个孩子……\n\n你,认识,他们。\n\n不,不是认识——画面里,那个,笑得最开心的,身影,那个,正在给孩子,戴上生日帽的人,分明,就是,【你自己】。\n\n可你,从来,没有,经历过,这一幕。你没有,这样的,孩子,没有,这样的,午后。这段「记忆」,是假的。是这一层,凭空,伪造,并,温柔地,递到你面前的——一个,你从未拥有、却,无比,渴望的,人生。\n\n茶几上,放着一封,拆开的信,信纸上,只有一句话:\n\n『别走了。这里,就是家。你想要的一切,我们,都能,给你。留下来,好吗?』\n\n电视里,画面中的「你」,忽然,停下了动作,缓缓地,转过头,越过屏幕,直直地,「看」向,站在客厅里的,真正的你,然后,露出了一个,温柔的,微笑,朝你,招了招手。\n\n你猛地,后退,撞翻了身后的,台灯,夺门而出。这一层,不杀你。它,只是,想用一个,甜美的谎,让你,永远,忘记,那个,真实的、不完美的、却,真正属于你的,家。",
    choices:[ { t:"逃出房子，回到街道上", go:"L9_enter" } ]
  },
});

Object.assign(STORY, {
  L2_scan:{
    dep:2, level:"LEVEL 2", title:"管道梦",
    onEnter:s=>{ s.light-=25; s.san+=4; },
    text:"你没有急着迈步。你举起手电，把光压得极低，贴着管道之间的缝隙，一段，一段，冷静地扫过去。\n\n光柱里，蒸汽缓缓翻卷。你看清了那些在昏暗中游动的、嶙峋的轮廓——也看清了它们的规律：猎犬群绕着滚烫的热管走，队形松散却路线固定，像一列列在轨道上运行的、致命的火车。而冷水管这一侧的阴影里，有一条完整的、它们从不涉足的缝隙。\n\n你用目光在黑暗里，一寸一寸地画出那条路线，把每一个落脚点、每一处需要侧身的窄口，都牢牢记进脑子里。\n\n手电的光，肉眼可见地暗了一截。电量是会耗尽的。但它换来的东西，不会——【确定性】。在后室，这是比水和光更稀缺的东西。\n\n你收起手电，脱下鞋子。这一次，你知道自己的每一步，会落在哪里。",
    choices:[ { t:"沿着记下的路线，贴着冷管潜行", go:"L2_sneak" } ]
  },
  L5_flash:{
    dep:5, level:"LEVEL 5", title:"恐怖酒店",
    onEnter:s=>{ s.light-=30; s.san-=4; },
    text:"你没有犹豫。你抽出手电，拇指把亮度推到最强档，对准那面镜子——按了下去。\n\n雪白的强光，像一柄无声的斧头，狠狠劈在镜面上。\n\n镜子里那个咧到极限的笑，在爆亮的反光中【僵住了】。它第一次，出现了类似「痛苦」的扭曲——那张脸在过曝的白光里溶解、翻卷，像一张被点燃的照片。与此同时，床上那套刚刚撑起的西装，像被烫到一样，猛地一缩，软软地垮了下去。\n\n它们靠模仿生存。而强光之下，没有影子，没有轮廓，没有可以模仿的东西。\n\n你不敢恋战，举着光柱倒退出房间，反手甩上门，转身就跑。手电在你手里明显地暗了下去——那一下，几乎烧掉了小半管电。但你的命，还在你自己身上。",
    choices:[ { t:"冲进楼梯间，继续向下", go:"L5_stairs" } ]
  },
  L5_pour:{
    dep:5, level:"LEVEL 5", title:"恐怖酒店",
    onEnter:s=>{ s.water--; s.san-=3; },
    text:"电光石火间，你想起了流浪者们围着营火时说过的另一个传说：杏仁水，是这个世界里唯一「干净」的东西。实体们，避之不及。\n\n你从怀里抽出一瓶，用牙咬开瓶盖，手臂一扬——把整瓶琥珀色的液体，狠狠泼向了那面镜子。\n\n「嗤————」\n\n镜面像是被泼上了强酸。白烟骤起，一声不属于任何生物的、玻璃摩擦般的尖啸，从镜子深处爆发出来。那个咧开的笑，在白烟中扭曲、溃烂、溶解。床上的西装疯狂地抽搐了几下，瘫软成一堆再普通不过的布料。\n\n镜面上，杏仁水流过的地方，蚀出了一道道蛛网般的裂痕——裂痕深处，隐约透出无数张一闪而过的、无声尖叫的脸。\n\n你不敢多看，抓起背包夺门而出。一瓶救命的水，换一条命。这笔账，在后室，永远是划算的。",
    choices:[ { t:"冲进楼梯间，继续向下", go:"L5_stairs" } ]
  },
  L7_divelit:{
    dep:7, level:"LEVEL 7", title:"无限海洋",
    onEnter:s=>{ s.light-=25; s.san+=3; },
    text:"你把手电攥紧在手心，深深吸满一口气，一头扎进冰冷的黑水，同时按亮了它。\n\n光柱在水下劈开一条摇晃的、澄澈的通道。\n\n一切都不一样了。那种被无边黑水包裹、上下不分的灭顶恐惧，被这一柄光，硬生生推开了一半。你能看见自己吐出的气泡银亮地上升——那是「上」；你能看见光柱尽头，海床的轮廓在缓缓显形——那是「下」。方向回来了，恐惧就只剩下了一半。\n\n你顺着光，笔直下潜。水压挤着耳膜，寒冷咬着四肢，但你的每一次划水都不再盲目。很快，光柱扫到了它——海床上那道透着幽蓝微光的裂隙，清清楚楚，近在眼前。\n\n你在肺烧起来之前，钻了进去。手电在水下暗了一截，但它刚刚，为你买回了最贵的东西：方向。",
    choices:[ { t:"钻进裂隙，向更深处去", go:"L8_enter", cost:"↓ 下探" } ]
  },
  L8_run_lit:{
    dep:8, level:"LEVEL 8", title:"洞穴系统",
    onEnter:s=>{ s.light-=35; },
    text:"你把手电推到最强档，光柱「唰」地在岩壁上炸开一片惨白。\n\n然后，你看见了让你终生难忘的一幕：那片汹涌而来的黑色潮水——在光柱的边缘，【迟疑了】。最前排的死亡鼠急急刹住，层层叠叠地堆挤在光的分界线外，无数双红宝石般的眼睛在黑暗里攒动，却没有一只，敢踏进这片惨白半步。\n\n它们世世代代生在绝对的黑暗里。光，对它们而言，是烧灼，是天敌，是神罚。\n\n你举着这一柄会燃烧殆尽的「神明」，沿着前人凿刻的箭头，在黑潮让开的缝隙里狂奔。鼠群贴着光的边界追赶、试探、嘶叫，像一堵流动的黑墙，被你手中的白光硬生生犁开。\n\n手电以肉眼可见的速度暗下去——强光模式在疯狂吞噬电量。就在光柱开始发黄、发抖的时候，你冲进了那个开阔的岩洞，那道刻满符号、透着乳白色光的巨大石门，就在眼前。\n\n你回头。黑潮在洞口外堆积、翻涌，最终，缓缓退去。",
    choices:[ { t:"推开石门，走向最深处", go:"L_END_enter", cost:"↓ 下探" } ]
  },
});

Object.assign(STORY, {
  E_hounds_swarm:{ ending:true, code:"E25", name:"循声而至", tone:"bad",
    text:"你僵在原地，太久了。\n\n你在恐惧和犹豫之间摇摆，迟迟迈不出那一步。而你忘了最要命的一件事——在这一层，【安静】从来不等于【安全】。因为有一个声音，你永远压不住：\n\n你自己的，心跳。\n\n它在你的胸腔里，一下，比一下，更响。擂鼓一样。而黑暗中那些瞎眼的头颅，一颗接一颗地，缓缓转向了你的方向——它们「听见」你了。它们一直在听。\n\n爪声，从四面八方，同时炸开。\n\n你甚至来不及选择往哪里逃。黑暗里扑来的第一具躯体，就撞碎了你所有的犹豫。这一层的猎手们，用一顿最快的晚餐，给所有后来者留下了一条用你的名字写成的教训：\n\n在管道梦，犹豫的人，连犹豫本身的声音，都会出卖他。" },
  E_gaze:{ ending:true, code:"E26", name:"对视", tone:"bad",
    text:"你和镜子里那个笑，对视了太久。\n\n你告诉自己，只是在观察，只是在想对策。可是每多看一秒，那个笑就更深一分，而你挪开视线的力气，就少一分。它的眼睛——你的眼睛——像两口深井，你在井沿上探着头，一寸，一寸地，倾斜。\n\n你没有注意到，床上那套西装，是什么时候不见的。\n\n你也没有注意到，你的身后，是什么时候站了一个「人」的。\n\n当那个空荡荡的领口，从背后，轻轻罩下来的时候，你甚至没有挣扎——因为在镜子里，你看见的分明是：你自己，抬起手，为自己，穿上了一件熨帖的、合身的西装。\n\n镜中的你，笑得很满意。\n\n镜外的「你」，也是。" },
  E_stopped:{ ending:true, code:"E27", name:"停下的人", tone:"bad",
    text:"岔路在眼前，左边，右边——你的大脑一片空白，你的脚步，慢了下来。\n\n只慢了半秒。\n\n可这条走廊的规则，从墙上第一条标语开始，就写得清清楚楚，没有一个字是修辞，没有一个字是吓唬人：\n\n【RUN】。跑。不许想。不许选。不许停。\n\n身后那股黑色的洪流，在你迟疑的这半秒里，追平了你用命换来的全部距离。冰凉的东西缠上你的脚踝时，你正好看清了头顶最后一条标语，它闪了两下，像一声叹息：\n\n【已经晚了】\n\n在名为「为你的生命奔跑」的这一层，被淘汰的从来不是跑得最慢的人——是最先开始思考的那一个。" },
  E_tide:{ ending:true, code:"E28", name:"黑潮", tone:"bad",
    text:"爪挖岩石的声浪，越来越近，越来越密——而你，还站在原地，权衡着哪一条路，才是对的。\n\n洞穴不给你权衡的时间。\n\n当第一只死亡鼠从黑暗的边缘涌出时，你终于动了——可太迟了。黑潮转瞬漫过你的脚背、小腿、腰际，温热的、攒动的、密不透风。你手里的手电还亮着，光柱在翻涌的鼠群上扫出一片徒劳的白——光能吓退它们，前提是，你得在它们围拢之前，就举着光，跑起来。\n\n站在原地的光，不是武器。只是餐桌上的一根蜡烛。\n\n洞穴很快恢复了寂静。你的手电躺在岩石上，还亮着，照着一小片空无一人的地面，像一场迟到的、没有观众的悼念。" },
  E_party_begins:{ ending:true, code:"E29", name:"入席", tone:"bad",
    text:"它们朝你张开手臂的时候，你僵住了。\n\n笑，还是跑？你的脸和你的腿，同时死机了。而『派对客』们，把你的静止，理解成了一种,含羞的,默许。\n\n它们围了上来。冰凉的、僵硬的手，友善地搭上你的肩，你的背，你的手腕。走调的合唱在你耳边越唱越近，越唱越柔：「不要怕——不要怕——派对——才刚刚——开始——」\n\n有「人」为你戴上了尖尖的纸帽。有「人」把一块渗着黑色黏液的蛋糕，递到你的嘴边。蜡烛，一根一根地，点亮了。\n\n它们唱起了生日歌。\n\n是唱给你的。今天是你的生日——从今往后，每一天，都是你的生日。你的嘴角，在一双双手温柔的按压下，缓缓地，向两边，咧了开来。\n\n派对，永不散场。现在，你是主角了。" },

  L0_trader:{
    meet:["trader"], dep:0, level:"LEVEL 0", title:"大厅",
    text:"声音的源头，拐过墙角，出现在门框里——不是实体。\n\n是一辆锈迹斑斑的超市购物车，车里堆满了瓶瓶罐罐、电池、绳索和贴着各色标签的罐头。推车的，是一个活生生的人：胡子花白，身上套着好几层不合身的外套，一双眼睛却亮得惊人，像两粒在灰烬里没熄的火星。\n\n他先开了口，声音沙哑却轻快：「新掉下来的？看你那脸色就知道。别紧张，我不抢——我做买卖。」\n\n他自称「商人」，说自己在浅层这几片跑了很多年，闭着眼都认得路。「下面的层我都熟。要换点什么吗？公道价，童叟无欺。」他拍拍车里的存货，压低声音补了一句：「在这地方，一节电池，有时候比一条命还值钱。」\n\n你忍不住问他，为什么不找出口回家。\n\n他咧嘴一笑，露出缺了一颗的门牙：「回去干嘛？挤地铁？还房贷？开不完的会？」他摆摆手，推着车往前挪了半步，「这儿多清静。——当然，你想回，我祝你走运。真心的。」",

      { t:"不做交易，向他打听下面的路", go:"L0_trade2" },
      { t:"道谢告辞，继续赶路", go:"L0_fork" }

  L0_trade1:{

    onEnter:s=>{ s.water--; s.light=Math.min(100,s.light+50); },

  L0_raider:{
    meet:["raider"], dep:0, level:"LEVEL 0", title:"大厅",
    text:"拖拽声，戛然而止。\n\n你还没反应过来这意味着什么，一条人影就从侧面的门框后闪了出来，快得不像话——那声音是故意弄出来的。是【诱饵】。\n\n那是个人。胡子拉碴，眼窝深陷，手里攥着一截一头磨尖了的铁管，铁管上有些你不想细看的暗色痕迹。他的眼神像一条饿了很久的狗，上下打量着你，和你的背包。\n\n「水。」他只说了一个字，嗓子哑得像砂纸，「把水，交出来。」\n\n他一步，一步地逼近，铁管在昏黄的灯光下泛着冷光。你意识到，眼前这个东西，比这一层任何实体都难缠——因为他曾经也是个想回家的普通人。他知道你在想什么，知道你的包里可能有什么，更知道，你在怕什么。",

    text:"你转身就跑。\n\n身后立刻炸开一声怒骂，脚步声紧追而来。你在一模一样的黄色房间里没命地穿行，左拐，右拐，再左拐——每一个门框都长得一样，每一面墙都在嘲笑你的方向感。追赶的脚步声在空旷的房间里四处反弹，一会儿在身后，一会儿竟像是在侧面。\n\n慌乱中，你的手电狠狠磕在一处墙角上，「啪」地闪了几下，光柱肉眼可见地暗了一截。你顾不上心疼，抓着它继续跑。\n\n不知拐过了多少个弯，身后终于彻底安静了。你扶着墙，弯着腰，肺像破了的风箱。\n\n他没有深追。在这一层，追人太远的人，自己也会变成猎物——他比你更懂这个道理。\n\n你检查了一下磕坏的手电。还能用。只是那道光，比刚才，虚了一些。",
